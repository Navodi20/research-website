name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Use Node 24 to avoid deprecation warnings on the runner; Vite supports Node >=20/22/24
          node-version: '24'
          cache: 'npm'

      - name: Build
        env:
          # Opt into Node 24 for JavaScript actions on the runner (prevents deprecation warnings)
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
          # Accept either `VITE_HF_API_KEY` or the alternate `VITE_HF_KEY` repository secret
          VITE_HF_API_KEY: ${{ secrets.VITE_HF_API_KEY || secrets.VITE_HF_KEY }}
        run: |
          # Sanity check: print Node and npm versions
          node -v
          npm -v
          # Ensure the Hugging Face key is available at build time for Vite
          if [ -z "$VITE_HF_API_KEY" ]; then
            echo "ERROR: VITE_HF_API_KEY is not set in Secrets (tried VITE_HF_API_KEY and VITE_HF_KEY)"
            exit 1
          fi
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }} # Set this in GitHub repo secrets
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (do not change)
          action: "upload"
          app_location: "/" # App root
          api_location: "api"   # Azure Functions API proxy
          output_location: "dist" # Vite build output
