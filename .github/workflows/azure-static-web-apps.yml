name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Use Node 24 to avoid deprecation warnings on the runner; Vite supports Node >=20/22/24
          node-version: '24'
          cache: 'npm'

      - name: Build
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        run: |
          node -v
          npm -v
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }} # Set this in GitHub repo secrets
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (do not change)
          action: "upload"
          app_location: "/" # App root
          output_location: "dist" # Vite build output
